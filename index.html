<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic tac toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        <table>
            <tr>
                <td><button data-row="0" data-col="0"></button></td>
                <td><button data-row="0" data-col="1"></button></td>
                <td><button data-row="0" data-col="2"></button></td>
            </tr>
            <tr>
               <td><button data-row="1" data-col="0"></button></td>
                <td><button data-row="1" data-col="1"></button></td>
                <td><button data-row="1" data-col="2"></button></td>
            </tr>
            <tr>
                <td><button data-row="2" data-col="0"></button></td>
                <td><button data-row="2" data-col="1"></button></td>
                <td><button data-row="2" data-col="2"></button></td>
            </tr>
        
        </table>
    </div>

<script src="practice.js"></script>
</body>
</html>
